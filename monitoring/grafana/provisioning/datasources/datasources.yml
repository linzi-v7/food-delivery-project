# =============================================================================
# Grafana Datasource Provisioning
#
# Auto-provisioned on container start. Grafana watches this directory
# and registers datasources without manual UI configuration.
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
