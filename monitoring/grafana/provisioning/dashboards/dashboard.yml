# =============================================================================
# Grafana Dashboard Provisioning
#
# Auto-provisions dashboards from JSON files on container start.
# Dashboards placed in the configured path are loaded automatically.
# =============================================================================

apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: true
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
