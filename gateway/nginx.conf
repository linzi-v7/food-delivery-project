user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Docker's embedded DNS resolver — enables service-name resolution
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ──────────────────────────────────────────────────────────────────
    # Rate Limit Zones
    # ──────────────────────────────────────────────────────────────────
    # Auth: strict (5 req/s, burst 3) — prevents brute-force on login/register
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # General API: moderate (50 req/s, burst 20) — for users, restaurants, orders, payments
    limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

    # ──────────────────────────────────────────────────────────────────
    # Upstream Definitions — service names match Docker Compose services
    # Passive health checks via max_fails / fail_timeout (OSS nginx)
    # ──────────────────────────────────────────────────────────────────
    upstream user_service {
        server user-service:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream restaurant_service {
        server restaurant-service:3002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream order_service {
        server order-service:3003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream payment_service {
        server payment-service:3004 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend_service {
        server frontend:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ──────────────────────────────────────────────────────────────────
    # API Gateway Server Block
    # ──────────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        # ── Gateway Health Check ───────────────────────────────────
        location = /gateway-health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"healthy","service":"api-gateway","timestamp":"$time_iso8601"}';
        }

        # ── Auth Routes → User Service (port 3001) ────────────────
        # /api/auth/login  →  user-service:/auth/login
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            limit_req_status 429;

            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Length' 0;
                return 204;
            }

            # CORS for regular responses
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'X-Total-Count, X-Page' always;

            # Strip /api/auth/ → /auth/ on the backend
            proxy_pass http://user_service/auth/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;
            proxy_read_timeout 10s;
        }

        # ── Users Routes → User Service (port 3001) ───────────────
        # Exact match for collection root: GET /api/users
        location = /api/users {
            limit_req zone=general burst=20 nodelay;
            limit_req_status 429;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'X-Total-Count, X-Page' always;

            proxy_pass http://user_service/users;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /api/users/42  →  user-service:/users/42
        location /api/users/ {
            limit_req zone=general burst=20 nodelay;
            limit_req_status 429;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'X-Total-Count, X-Page' always;

            proxy_pass http://user_service/users/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;
            proxy_read_timeout 10s;
        }

        # ── Restaurants Routes → Restaurant Service (port 3002) ───
        # Exact match for collection root: POST/GET /api/restaurants
        location = /api/restaurants {
            limit_req zone=general burst=20 nodelay;
            limit_req_status 429;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'X-Total-Count, X-Page' always;

            proxy_pass http://restaurant_service/restaurants;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;
            proxy_read_timeout 15s;
        }

        # Sub-resources: /api/restaurants/:id, /api/restaurants/:id/menu
        location /api/restaurants/ {
            limit_req zone=general burst=20 nodelay;
            limit_req_status 429;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'X-Total-Count, X-Page' always;

            proxy_pass http://restaurant_service/restaurants/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;
            proxy_read_timeout 15s;
        }

        # ── Orders Routes → Order Service (port 3003) ─────────────
        # Exact match for collection root: POST /api/orders
        location = /api/orders {
            limit_req zone=general burst=20 nodelay;
            limit_req_status 429;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'X-Total-Count, X-Page' always;

            proxy_pass http://order_service/orders;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;
            proxy_read_timeout 30s;
        }

        # Sub-resources: /api/orders/:id, /api/orders/:id/status
        location /api/orders/ {
            limit_req zone=general burst=20 nodelay;
            limit_req_status 429;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'X-Total-Count, X-Page' always;

            proxy_pass http://order_service/orders/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;
            proxy_read_timeout 30s;
        }

        # ── Payments Routes → Payment Service (port 3004) ─────────
        # Exact match for collection root: POST /api/payments
        location = /api/payments {
            limit_req zone=general burst=20 nodelay;
            limit_req_status 429;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'X-Total-Count, X-Page' always;

            proxy_pass http://payment_service/payments;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;
            proxy_read_timeout 30s;
        }

        # Sub-resources: /api/payments/:txnId, /api/payments/order/:orderId
        location /api/payments/ {
            limit_req zone=general burst=20 nodelay;
            limit_req_status 429;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'X-Total-Count, X-Page' always;

            proxy_pass http://payment_service/payments/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;
            proxy_read_timeout 30s;
        }

        # ── API Catch-all — unmatched /api/* paths ────────────────
        location /api/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Length' 0;
                return 204;
            }
            default_type application/json;
            return 404 '{"error":"Not Found","message":"Endpoint not found"}';
        }

        # ── Frontend SPA → Frontend Service (port 80) ─────────────
        location / {
            proxy_pass http://frontend_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;
            proxy_read_timeout 30s;
        }

        # ── Custom Error Pages (JSON) ──────────────────────────────
        error_page 429 /rate-limit.json;
        error_page 502 503 504 /gateway-error.json;

        location = /rate-limit.json {
            internal;
            default_type application/json;
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please retry later."}';
        }

        location = /gateway-error.json {
            internal;
            default_type application/json;
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            return 502 '{"error":"Bad Gateway","message":"Upstream service unavailable. Please try again later."}';
        }
    }
}
