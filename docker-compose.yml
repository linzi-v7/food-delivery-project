
services:
  # Databases 
  user-service-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: user_service
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d user_service"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - fooddelivery-network

  restaurant-service-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: restaurant_service
    volumes:
      - restaurant-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d restaurant_service"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - fooddelivery-network

  order-service-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: order_service
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d order_service"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - fooddelivery-network

  payment-service-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: payment_service
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d payment_service"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - fooddelivery-network

  # Microservices
  user-service:
    image: fooddelivery/user-service:latest
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./services/user-service/.env
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS}
    depends_on:
      user-service-db:
        condition: service_healthy
    networks:
      - fooddelivery-network

  restaurant-service:
    image: fooddelivery/restaurant-service:latest
    build:
      context: ./services/restaurant-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./services/restaurant-service/.env
    depends_on:
      restaurant-service-db:
        condition: service_healthy
    networks:
      - fooddelivery-network

  order-service:
    image: fooddelivery/order-service:latest
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./services/order-service/.env
    environment:
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      RESTAURANT_SERVICE_URL: ${RESTAURANT_SERVICE_URL}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL}
    depends_on:
      order-service-db:
        condition: service_healthy
      user-service:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy
    networks:
      - fooddelivery-network

  payment-service:
    image: fooddelivery/payment-service:latest
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./services/payment-service/.env
    environment:
      PAYMENT_SUCCESS_RATE: ${PAYMENT_SUCCESS_RATE}
      PAYMENT_PROCESSING_DELAY_MS: ${PAYMENT_PROCESSING_DELAY_MS}
    depends_on:
      payment-service-db:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - fooddelivery-network

  # Frontend
  frontend:
    image: fooddelivery/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - fooddelivery-network

  # API Gateway (Nginx reverse proxy — the ONLY public entry point)
  api-gateway:
    image: fooddelivery/api-gateway:latest
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      user-service:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - fooddelivery-network

  # ── Monitoring Stack ────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - fooddelivery-network
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - fooddelivery-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - fooddelivery-network

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - fooddelivery-network

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - fooddelivery-network

volumes:
  user-db-data:
  restaurant-db-data:
  order-db-data:
  payment-db-data:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  fooddelivery-network:
    name: fooddelivery-network
    driver: bridge
