---
# Ingress: Routes external traffic to the API Gateway service
# Uses networking.k8s.io/v1 with spec.ingressClassName (NOT the deprecated annotation)
# Target: Minikube — configure /etc/hosts with "127.0.0.1 fooddelivery.local"
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: prod
  labels:
    app: api-gateway
    component: ingress
spec:
  ingressClassName: nginx
  rules:
    - host: fooddelivery.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
