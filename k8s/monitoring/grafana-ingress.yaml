# Grafana Ingress: Routes /grafana traffic to the Grafana dashboard
# Same host (fooddelivery.local) as the API gateway ingress, using nginx ingressClassName
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: prod
  labels:
    app: grafana
    component: monitoring
spec:
  ingressClassName: nginx
  rules:
    - host: fooddelivery.local
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
