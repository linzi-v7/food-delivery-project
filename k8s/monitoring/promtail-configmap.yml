apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: prod
  labels:
    app: promtail
    component: monitoring
data:
  promtail-config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: system
        static_configs:
          - targets:
              - localhost
            labels:
              job: varlogs
              __path__: /var/log/*.log

      - job_name: docker-containers
        docker_sd_configs:
          - host: unix:///var/run/docker.sock
            refresh_interval: 15s
        relabel_configs:
          - source_labels: ['__meta_docker_container_name']
            regex: '/(.*)'
            target_label: 'container_name'
        pipeline_stages:
          - docker: {}
          - json:
              expressions:
                level: level
                msg: msg
                time: time
          - labels:
              level:
