apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: prod
  labels:
    app: grafana
    component: monitoring
data:
  datasources.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: true

  dashboard.yml: |
    apiVersion: 1

    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: true
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards
