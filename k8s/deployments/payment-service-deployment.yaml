apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: prod
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: fooddelivery/payment-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3004
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            periodSeconds: 10
            failureThreshold: 3
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            periodSeconds: 20
            failureThreshold: 3
            initialDelaySeconds: 15
          envFrom:
            - configMapRef:
                name: payment-service-configmap
            - secretRef:
                name: payment-service-secret
