---
# Restaurant Service Deployment
# Port: 3002 | Replicas: 2 | Health check: /health
apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-service
  namespace: prod
  labels:
    app: restaurant-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: restaurant-service
  template:
    metadata:
      labels:
        app: restaurant-service
    spec:
      containers:
        - name: restaurant-service
          image: fooddelivery/restaurant-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          envFrom:
            - configMapRef:
                name: restaurant-service-configmap
            - secretRef:
                name: restaurant-service-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            periodSeconds: 10
            failureThreshold: 3
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            periodSeconds: 20
            failureThreshold: 3
            initialDelaySeconds: 15
