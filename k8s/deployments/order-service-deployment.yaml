---
# Order Service Deployment
# Port: 3003 | Replicas: 2 | Health check: /health
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: prod
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: fooddelivery/order-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            periodSeconds: 10
            failureThreshold: 3
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            periodSeconds: 20
            failureThreshold: 3
            initialDelaySeconds: 15
          envFrom:
            - configMapRef:
                name: order-service-configmap
            - secretRef:
                name: order-service-secret
