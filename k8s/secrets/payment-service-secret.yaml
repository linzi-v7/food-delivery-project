# ── Template only — real values are generated by k8s/scripts/generate-secrets.sh ──
# See k8s/secrets/user-service-secret.yaml for full explanation.
# ────────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: payment-service-secret
  namespace: prod
type: Opaque
stringData:
  DB_USER: "<from .env POSTGRES_USER>"
  DB_PASSWORD: "<from .env POSTGRES_PASSWORD>"
  DATABASE_URL: "postgresql://<user>:<password>@payment-db-service:5432/payment_service"
