# ── Template only — real values are generated by k8s/scripts/generate-secrets.sh ──
# This file documents the expected secret structure. The actual deployable secrets
# are written to .tmp/k8s-secrets/ (gitignored) from root .env values.
#
# To deploy:  bash k8s/scripts/generate-secrets.sh && ./k8s/deploy.sh
#             or simply:  make k8s-deploy
# ────────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
  namespace: prod
type: Opaque
stringData:
  DB_USER: "<from .env POSTGRES_USER>"
  DB_PASSWORD: "<from .env POSTGRES_PASSWORD>"
  DATABASE_URL: "postgresql://<user>:<password>@user-db-service:5432/user_service"
  JWT_SECRET: "<from .env JWT_SECRET>"
