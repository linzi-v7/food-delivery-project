services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurant-service-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-restaurant_service}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-restaurant_service}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - restaurant-service-net

  restaurant-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restaurant-service-app
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: "3002"
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-restaurant_service}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - restaurant-service-net

volumes:
  pgdata:
    driver: local

networks:
  restaurant-service-net:
    driver: bridge
